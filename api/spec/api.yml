openapi: 3.0.1
info:
  title: Lgm
  version: 0.0.1
  description: |
    LGM API. Authentication is handled by an upstream reverse-proxy (nginx + Authelia).
    The proxy injects identity headers (Remote-User, Remote-Name, Remote-Email, Remote-Groups)
    which the service uses for ownership and permission checks.
servers:
- url: /
paths:
  /games:
    post:
      summary: create a new game
      operationId: createGame
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                maxPlayers:
                  type: integer
                  minimum: 2
                  maximum: 8
      responses:
        "200":
          description: metadata about newly created game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameCreatedResponse'
      x-swagger-router-controller: GameController
    get:
      summary: list games
      operationId: listGames
      x-exegesis-controller: GameController
      responses:
        "200":
          description: list of games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGamesResponse'      
  /games/{id}:
    put:
      summary: join a game
      operationId: joinGame
      security:
        - bearerAuth: []

      x-exegesis-controller: GameController
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      responses:
        "204":
          description: join request accepted
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "403":
          description: join request denied
          content:
  /games/{gameId}/players/{playerId}:
    delete:
      summary: kick a player from a game
      operationId: kickPlayer
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: player kicked
        "400":
          description: bad request
    get:
      summary: get current game state for a specific player
      operationId: getPlayerGameState
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: current game state for the player
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinGameResponse'
        "400":
          description: bad request
        "403":
          description: forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: player not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /games/{gameId}/start:
    put:
      summary: start a game
      operationId: startGame
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: game started
        "400":
          description: bad request
  /games/{gameId}/host:
    put:
      summary: transfer host to another player
      operationId: transferHost
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - newHostPlayerId
              properties:
                newHostPlayerId:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: host transferred
        "400":
          description: bad request
  /users/login:
    post:
      summary: User login (deprecated — returns 410 Gone)
      description: |
        This endpoint is deprecated. Authentication is handled by the upstream reverse proxy.
        Always returns 410 Gone.
      operationId: loginUser
      x-exegesis-controller: UsersController
      x-swagger-router-controller: UsersController
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 256
                password:
                  type: string
                  minLength: 1
                  maxLength: 256
      responses:
        "410":
          description: Login no longer supported; authentication handled by proxy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /users/me:
    get:
      summary: Get current user identity
      description: |
        Returns the current user as resolved from proxy identity headers.
        Guest users (no proxy headers) receive the guest sentinel object.
      operationId: getCurrentUser
      x-exegesis-controller: UsersController
      x-swagger-router-controller: UsersController
      responses:
        "200":
          description: Current user identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserIdentity'
  /games/{gameId}/turns/{turn}/players/{playerId}:
    get:
      summary: get turn results
      operationId: turnResults
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: turn
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      responses:
        "200":
          description: turn results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResultsResponse'
      x-swagger-router-controller: GameController
    post:
      summary: post turn orders
      operationId: postOrders
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: turn
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnOrders'
        required: true
      responses:
        "202":
          description: accepted
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
      x-swagger-router-controller: GameController
components:
  schemas:
    GameCreatedResponse:
      type: object
      required:
      - gameId
      properties:
        gameId:
          type: integer
      example:
        gameId: 0
    JoinGameResponse:
      type: object
      properties:
        gameId:
          type: integer
        playerId:
          type: integer
        turn:
          type: integer
        world:
          $ref: '#/components/schemas/World'
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        hostPlayerId:
          type: integer
        gameState:
          $ref: '#/components/schemas/GameState'
    ErrorMessageResponse:
      type: object
      required:
      - message
      properties:
        message:
          type: string
    TurnOrders:
      type: object
      additionalProperties: false
      required:
        - orders
      properties:
        gameId:
          type: integer
          minimum: 0
        turn:
          type: integer
          minimum: 1
        playerId:
          type: integer
          minimum: 0
        orders:
          type: array
          maxItems: 64
          items:
            $ref: '#/components/schemas/TurnOrders_orders'
    TurnResultsResponse:
      type: object
      properties:
        world:
          $ref: '#/components/schemas/World'
    World:
      type: object
      properties:
        id:
          type: integer
        actorIds:
          type: array
          items:
            type: integer
        actors:
          type: array
          items:
            $ref: '#/components/schemas/Actor'
        terrain:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/TerrainTile'
    Actor:
      type: object
      required:
        - id
        - pos
        - state
        - owner
      properties:
        id:
          type: integer
        pos:
          $ref: '#/components/schemas/GridPosition'
        state:
          $ref: '#/components/schemas/ActorState'
        owner:
          type: integer # playerId
        health:
          type: integer
        weapon:
          $ref: '#/components/schemas/Weapon'
    GridPosition:
      type: object
      required:
        - x
        - y
      properties:
        x:
          type: integer
        y:
          type: integer
    TerrainTile: # Renamed from Terrain to avoid conflict with enum name if generated directly
      type: integer
      description: "0: EMPTY, 1: BLOCKED, 2: UNEXPLORED"
      enum: [0, 1, 2]
    ActorState:
      type: integer
      description: "0: DEAD, 1: ALIVE"
      enum: [0, 1]
    GameState:
      type: string
      enum: [LOBBY, IN_PROGRESS, COMPLETED]
    Weapon:
      type: object
      required:
        - name
        - minRange
        - maxRange
        - damage
      properties:
        name:
          type: string
        minRange:
          type: integer
          description: "Minimum range in hexes (0 for melee weapons)"
        maxRange:
          type: integer
          description: "Maximum range in hexes"
        damage:
          type: integer
        ammo:
          type: integer
    TurnOrders_orders:
      type: object
      additionalProperties: false
      required:
        - actorId
        - toQ
        - toR
      properties:
        actorId:
          type: integer
          minimum: 0
        toQ:
          type: integer
        toR:
          type: integer
    ListGamesResponse:
      type: object
      properties:
        gameIds:
          type: array
          items:
            type: integer
        games:
          type: array
          items:
            $ref: '#/components/schemas/GameSummary'
    GameSummary:
      type: object
      required:
        - id
        - playerCount
        - maxPlayers
        - isFull
      properties:
        id:
          type: integer
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        isFull:
          type: boolean
  # securitySchemes:
  #   bearerAuth:
  #     type: http
  #     scheme: bearer
    LoginResponse:
      type: object
      properties:
        token:
          type: string
    UserIdentity:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        groups:
          type: array
          items:
            type: string
        isGuest:
          type: boolean
  securitySchemes:
    bearerAuth:
      description: |
        Authentication is handled by an upstream reverse proxy that injects
        Remote-User, Remote-Name, Remote-Email, and Remote-Groups headers.
        This scheme name is retained for internal routing only; no bearer tokens
        are issued or accepted by this service.
      type: apiKey
      in: header
      name: Remote-User
