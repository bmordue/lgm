openapi: 3.0.1
info:
  title: Lgm
  version: 0.0.1
  description: |
    LGM API. Authentication is handled by an upstream reverse-proxy (nginx + Authelia).
    The proxy injects identity headers (Remote-User, Remote-Name, Remote-Email, Remote-Groups)
    which the service uses for ownership and permission checks.
  license:
    name: Unlicense
servers:
- url: /
paths:
  /games:
    post:
      summary: create a new game
      operationId: createGame
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                maxPlayers:
                  type: integer
      responses:
        "201":
          description: metadata about newly created game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameCreatedResponse'
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
      x-swagger-router-controller: GameController
    get:
      summary: list games
      operationId: listGames
      security: []
      x-exegesis-controller: GameController
      responses:
        "200":
          description: list of games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGamesResponse'      
  /games/{id}:
    put:
      summary: join a game
      operationId: joinGame
      security:
        - bearerAuth: []

      x-exegesis-controller: GameController
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      responses:
        "200":
          description: joined game state for the requesting player
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinGameResponse'
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "401":
          description: authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "403":
          description: join request denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /games/{gameId}/players/{playerId}:
    delete:
      summary: kick a player from a game
      operationId: kickPlayer
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: player kicked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "403":
          description: forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: game or player not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
    get:
      summary: get current game state for a specific player
      operationId: getPlayerGameState
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: current game state for the player
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinGameResponse'
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "403":
          description: forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: player not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /games/{gameId}/start:
    put:
      summary: start a game
      operationId: startGame
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: game started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "403":
          description: forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /games/{gameId}/host:
    put:
      summary: transfer host to another player
      operationId: transferHost
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newHostPlayerId:
                  type: integer
      responses:
        "200":
          description: host transferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "403":
          description: forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: game or player not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /games/{gameId}/actors/{actorId}/targets:
    get:
      summary: Get valid attack targets for an actor
      operationId: getValidTargets
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        schema:
          type: integer
      - name: actorId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: List of valid targets
          content:
            application/json:
              schema:
                type: object
                properties:
                  targets:
                    type: array
                    items:
                      type: object
                      properties:
                        actorId:
                          type: integer
                        distance:
                          type: integer
                        canAttack:
                          type: boolean
  /users/login:
    post:
      summary: User login (deprecated — returns 410 Gone)
      description: |
        This endpoint is deprecated. Authentication is handled by the upstream reverse proxy.
        Always returns 410 Gone.
      operationId: loginUser
      security: []
      x-exegesis-controller: UsersController
      x-swagger-router-controller: UsersController
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "410":
          description: Login no longer supported; authentication handled by proxy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
  /users/me:
    get:
      summary: Get current user identity
      description: |
        Returns the current user as resolved from proxy identity headers.
        Guest users (no proxy headers) receive the guest sentinel object.
      operationId: getCurrentUser
      security: []
      x-exegesis-controller: UsersController
      x-swagger-router-controller: UsersController
      responses:
        "200":
          description: Current user identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserIdentity'
  /games/{gameId}/turns/{turn}/players/{playerId}:
    get:
      summary: get turn results
      operationId: turnResults
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: turn
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      responses:
        "200":
          description: turn results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResultsResponse'
        "401":
          description: authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: turn results not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
      x-swagger-router-controller: GameController
    post:
      summary: post turn orders
      operationId: postOrders
      security:
        - bearerAuth: []
      x-exegesis-controller: GameController
      parameters:
      - name: gameId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: turn
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      - name: playerId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnOrders'
        required: true
      responses:
        "200":
          description: submitted orders status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostOrdersResponse'
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "401":
          description: authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "404":
          description: game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
      x-swagger-router-controller: GameController
components:
  schemas:
    GameCreatedResponse:
      type: object
      description: Response payload returned when a new game is successfully created.
      required:
        - gameId
      properties:
        gameId:
          type: integer
      example:
        gameId: 0
    JoinGameResponse:
      type: object
      required:
        - gameId
        - playerId
        - turn
        - world
        - playerCount
        - maxPlayers
      properties:
        gameId:
          type: integer
        playerId:
          type: integer
        turn:
          type: integer
        world:
          $ref: '#/components/schemas/World'
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        hostPlayerId:
          type: integer
        gameState:
          $ref: '#/components/schemas/GameState'
    ErrorMessageResponse:
      type: object
      description: Standard error response payload used across API endpoints.
      required:
        - message
      properties:
        message:
          type: string
    SuccessResponse:
      type: object
      description: Generic success payload for operations that do not return resource data.
      required:
      - success
      properties:
        success:
          type: boolean
    PostOrdersResponse:
      type: object
      description: Indicates whether all required player orders have been submitted for the turn.
      required:
      - turnStatus
      properties:
        turnStatus:
          type: object
          required:
          - complete
          properties:
            complete:
              type: boolean
    TurnOrders:
      type: object
      required:
        - orders
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/ActorOrders'
    TurnResultsResponse:
      type: object
      description: Contains the resolved world state returned after turn processing completes.
      required:
        - world
      properties:
        world:
          $ref: '#/components/schemas/World'
    World:
      type: object
      properties:
        id:
          type: integer
        actorIds:
          type: array
          items:
            type: integer
        actors:
          type: array
          items:
            $ref: '#/components/schemas/Actor'
        terrain:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/TerrainTile'
    Actor:
      type: object
      required:
        - id
        - pos
        - state
        - owner
      properties:
        id:
          type: integer
        pos:
          $ref: '#/components/schemas/GridPosition'
        state:
          $ref: '#/components/schemas/ActorState'
        owner:
          type: integer # playerId
        health:
          type: integer
        weapon:
          $ref: '#/components/schemas/Weapon'
    GridPosition:
      type: object
      required:
        - x
        - y
      properties:
        x:
          type: integer
        y:
          type: integer
    TerrainTile: # Renamed from Terrain to avoid conflict with enum name if generated directly
      type: integer
      description: "0: EMPTY, 1: BLOCKED, 2: UNEXPLORED"
      enum: [0, 1, 2]
    ActorState:
      type: integer
      description: "0: DEAD, 1: ALIVE"
      enum: [0, 1]
    GameState:
      type: string
      enum: [LOBBY, IN_PROGRESS, COMPLETED]
    Weapon:
      type: object
      required:
        - name
        - minRange
        - maxRange
        - damage
      properties:
        name:
          type: string
        minRange:
          type: integer
          description: "Minimum range in hexes (0 for melee weapons)"
        maxRange:
          type: integer
          description: "Maximum range in hexes"
        damage:
          type: integer
        ammo:
          type: integer
    ActorOrders:
      type: object
      required:
        - actorId
        - orderType
      properties:
        actorId:
          type: integer
        orderType:
          type: integer
          description: "Order type (0: MOVE, 1: ATTACK)"
          enum: [0, 1]
        ordersList:
          type: array
          description: Ordered list of movement directions for MOVE orders.
          items:
            $ref: '#/components/schemas/Direction'
        targetId:
          type: integer
          description: Target actor identifier for ATTACK orders.
    Direction:
      type: integer
      description: "0: UP_LEFT, 1: UP_RIGHT, 2: LEFT, 3: RIGHT, 4: DOWN_LEFT, 5: DOWN_RIGHT, 6: NONE"
      enum: [0, 1, 2, 3, 4, 5, 6]
    ListGamesResponse:
      properties:
        gameIds:
          type: array
          items:
            type: integer
        games:
          type: array
          items:
            $ref: '#/components/schemas/GameSummary'
    GameSummary:
      required:
        - id
        - playerCount
        - maxPlayers
        - isFull
      properties:
        id:
          type: integer
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        isFull:
          type: boolean
    LoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    UserIdentity:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        groups:
          type: array
          items:
            type: string
        isGuest:
          type: boolean
  securitySchemes:
    bearerAuth:
      description: |
        Authentication is handled by an upstream reverse proxy that injects
        Remote-User, Remote-Name, Remote-Email, and Remote-Groups headers.
        This scheme name is retained for internal routing only; no bearer tokens
        are issued or accepted by this service.
      type: apiKey
      in: header
      name: Remote-User
