name: API-CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: ./api
        run: npm install

      - name: Build
        working-directory: ./api
        run: npm run build

      - name: Run tests
        working-directory: ./api
        run: npm run test:ci

      - name: Start server for E2E tests
        working-directory: ./api
        run: |
          node built/index.js &
          echo $! > /tmp/server.pid
          echo "Waiting for server to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/games > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Server failed to start within 60s"
              exit 1
            fi
            sleep 1
          done

      - name: Run E2E tests
        working-directory: ./api
        run: npm run test:e2e:ci

      - name: Stop server after E2E tests
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

      - name: Install client dependencies
        working-directory: ./client
        run: npm install

      - name: Run client unit tests
        working-directory: ./client
        run: npm run test:unit -- --run --reporter=default --reporter=junit --outputFile.junit=test-results/client-results.xml

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/test-results/*.xml'
          reporter: java-junit

      - name: Run Stryker.js mutation testing
        working-directory: ./api
        run: npx stryker run
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

