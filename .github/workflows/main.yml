name: API-CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: ./api
        run: npm install

      - name: Build
        working-directory: ./api
        run: npm run build

      - name: Run tests
        working-directory: ./api
        run: npm test

      - name: Start server for E2E tests
        working-directory: ./api
        run: |
          node built/index.js &
          echo $! > /tmp/server.pid
          echo "Waiting for server to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/games > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Server failed to start within 60s"
              exit 1
            fi
            sleep 1
          done

      - name: Run E2E tests
        working-directory: ./api
        run: npm run test:e2e

      - name: Stop server after E2E tests
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

      - name: Run Stryker.js mutation testing
        working-directory: ./api
        run: npx stryker run
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

